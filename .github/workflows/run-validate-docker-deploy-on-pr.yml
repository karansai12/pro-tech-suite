name: Docker Compose Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate-docker:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend  # all run steps execute in backend folder

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Docker Buildx (for consistent builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Create .env file
        run: |
          # Create .env file
          echo "PORT=5000" > .env
          echo "JWT_SECRET=test_secret" >> .env
          echo "DATABASE_URL=postgresql://user:password@localhost/db" >> .env

      # 3️⃣ Build and validate prod environment
      - name: Validate Prod Docker Compose
        run: |
          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d
          sleep 5
          docker ps

      - name: Test backend HTTP endpoint
        run: |
          RESPONSE=$(curl -s http://localhost:5000/api/ping)
          echo "Backend response: $RESPONSE"
          
          # Extract the message field using 'jq' (JSON parser)
          MESSAGE=$(echo "$RESPONSE" | jq -r '.message')
          
          if [ "$MESSAGE" != "server is running" ]; then
            echo "Backend not responding correctly"
            exit 1
          fi

      - name: Show Docker image size in bytes
        run: |
          echo "Listing all Docker images:"
          docker images
          IMAGE_NAME=edu-hub-backend
          IMAGE_TAG=latest
          SIZE_BYTES=$(docker inspect ${IMAGE_NAME}:${IMAGE_TAG} --format='{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Docker image size: ${SIZE_MB} MB"