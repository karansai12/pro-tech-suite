name: Run ESLint and Build Validation on Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend  # all run steps execute in backend folder

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Create .env file
        run: |
          # Create .env file
          echo "PORT=5000" > .env
          echo "JWT_SECRET=test_secret" >> .env
          echo "DATABASE_URL=postgresql://user:password@localhost/db" >> .env

      # 3️⃣ Install dependencies and generate Prisma client
      - name: Install dependencies and generate Prisma client
        run: |
          npm ci
          npm run prisma:generate

      # 5️⃣ Build validation (TypeScript type check)
      - name: Build Validation
        run: npm run build:check